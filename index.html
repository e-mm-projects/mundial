<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Idle Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="login-screen" class="login-overlay">
        <div class="login-box">
            <h1 class="login-title">Fotbalový Manažer</h1>
        
            <form id="login-form" onsubmit="event.preventDefault(); registerManager();">
                <div class="login-input-group">
                    <input type="text" id="manager-name-input" placeholder="Zadej své jméno..." 
                        maxlength="15" class="login-input" required>
                    <button type="submit" id="main-login-btn" class="btn-task btn-login-main">Přihlásit se</button>
                </div>
            
                <div id="avatar-section" class="avatar-selection-container">
                    <h3 style="color: #4e342e; margin: 0;">Vyber si svého avatara:</h3>
                    <div class="avatar-grid">
                        <img src="images/avatar1.jpg" class="avatar-img" onclick="selectAvatar('images/avatar1.jpg')" alt="Avatar 1">
                        <img src="images/avatar2.jpg" class="avatar-img" onclick="selectAvatar('images/avatar2.jpg')" alt="Avatar 2">
                        <img src="images/avatar3.jpg" class="avatar-img" onclick="selectAvatar('images/avatar3.jpg')" alt="Avatar 3">
                    </div>
                </div>
            
                <div class="login-footer">
                    <button type="button" id="new-club-footer-btn" onclick="startNewClub()" 
                            class="btn-task btn-test" style="width: 100%;">Založit nový klub (Reset)</button>
                </div>
            </form>
        </div>
    </div>
            
    <header id="top-bar">
        <div class="manager-profile" style="display: flex; align-items: center; gap: 10px; margin-right: auto;">
            <img id="topbar-avatar" src="images/avatar1.jpg" alt="Avatar" style="width: 45px; height: 45px; border-radius: 50%; object-fit: cover; border: 2px solid white;">
            <div class="manager-info" style="display: flex; flex-direction: column; text-align: left; line-height: 1.2;">
                <div style="display: flex; align-items: center;">
                    <span id="manager-name-display" style="font-weight: bold; color: white;">Manažer</span>
                    <button onclick="logout()" class="btn-logout">Odhlásit</button>
                </div>
                <span style="font-size: 0.8em; color: #ccc;">Level trenéra: <span id="ui-level">-</span></span>
            </div>
        </div>

        <div class="resource">XP: <span id="ui-xp">-</span> / <span id="ui-max-xp">-</span></div>
        <div class="resource">Peníze: <span id="ui-money">-</span></div>
        <div class="resource">Energie: <span id="ui-energy">-</span> / 100
        <div class="resource" style="color: #fcd34d; margin-left: 30px; border-left: 2px solid rgba(255,255,255,0.2); padding-left: 15px;">
            Konec sezóny: <span id="topbar-season-timer" style="font-family: monospace; font-weight: bold; font-size: 1.1em;">--:--</span>
            <button onclick="resetEnergy()" style="margin-left: 10px; padding: 2px 8px; background-color: #f59e0b; color: white; border: none; border-radius: 3px; cursor: pointer; font-weight: bold;">[TEST] Max</button>
            <button onclick="hardReset()" style="margin-left: 5px; padding: 2px 8px; background-color: #dc2626; color: white; border: none; border-radius: 3px; cursor: pointer; font-weight: bold;">[TEST] Smazat Save</button>
        </div>
    </header>

    <div id="container">
        <nav id="sidebar">
            <button class="nav-btn" data-target="office" data-name="Kancelář">Kancelář</button>
            <button class="nav-btn" data-target="training" data-name="Tréninkové hřiště">Tréninkové hřiště</button>
            <button class="nav-btn" data-target="match" data-name="Zápasy">Zápasy</button>
            <button class="nav-btn" data-target="shop" data-name="Obchod">Obchod</button>
            <button class="nav-btn" data-target="scouting" data-name="Skauting">Skauting</button>
            <button class="nav-btn" data-target="stadium" data-name="Stadion">Stadion</button>
            <button class="nav-btn" data-target="locker-room" data-name="Šatna">Šatna</button>
            <button class="nav-btn" data-target="pve" data-name="Podzemí (PvE)">Podzemí (PvE)</button>
            <button class="nav-btn" data-target="hall-of-fame" data-name="Síň Slávy">Síň Slávy</button>
            <button class="nav-btn" data-target="mail" data-name="Pošta">Pošta</button>
            <button class="nav-btn" data-target="alliance" data-name="Aliance">Aliance</button>
        </nav>

        <main id="main-content">
            <h1>Vítej v klubu, trenére!</h1>
            <p>Vyber si v menu, kam chceš jít. Většina klubu se teprve staví!</p>
        </main>
    </div>

    <script src="config.js"></script>
    <script src="engine.js"></script>
    <script src="ui.js"></script>
    <script src="game.js"></script>
</body>
</html>
