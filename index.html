<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Idle Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="login-screen" class="login-overlay">
        <div class="login-box">
            <h1 class="login-title">Fotbalový Manažer</h1>
        
            <form id="login-form" onsubmit="event.preventDefault(); registerManager();">
                <div class="login-input-group">
                    <input type="text" id="manager-name-input" placeholder="Zadej své jméno..." 
                        maxlength="15" class="login-input" required>
                    <button type="submit" id="main-login-btn" class="btn-task btn-login-main">Přihlásit se</button>
                </div>
            
                <div id="avatar-section" class="avatar-selection-container">
                    <h3 style="color: #4e342e; margin: 0;">Vyber si svého avatara:</h3>
                    <div class="avatar-grid">
                        <img src="images/avatar1.jpg" class="avatar-img" onclick="selectAvatar('images/avatar1.jpg')" alt="Avatar 1">
                        <img src="images/avatar2.jpg" class="avatar-img" onclick="selectAvatar('images/avatar2.jpg')" alt="Avatar 2">
                        <img src="images/avatar3.jpg" class="avatar-img" onclick="selectAvatar('images/avatar3.jpg')" alt="Avatar 3">
                    </div>
                </div>
            
                <div class="login-footer">
                    <button type="button" id="new-club-footer-btn" onclick="startNewClub()" 
                            class="btn-task btn-test" style="width: 100%;">Založit nový klub (Reset)</button>
                </div>
            </form>
        </div>
    </div>
            
    <header id="top-bar" style="display: flex; align-items: center; justify-content: space-between; padding: 10px; width: 100%; box-sizing: border-box; gap: 5px;">
        
        <div class="manager-profile" style="display: flex; align-items: center; gap: 10px; flex: 1;">
            <img id="topbar-avatar" src="images/avatar1.jpg" alt="Avatar" style="width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 2px solid white;">
            <span id="manager-name-display" style="font-weight: bold; color: white; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 120px;">Manažer</span>
        </div>

        <div class="resource" style="white-space: nowrap; font-size: 1.1rem; font-weight: bold; background: rgba(0,0,0,0.8); padding: 5px 15px; border-radius: 20px; border: 1px solid #fcd34d; box-shadow: 0 0 10px rgba(252, 211, 77, 0.2);">
            <span style="color: #fcd34d; margin-right: 5px;">Finance klubu:</span>
            <span id="ui-money" style="color: white;">-</span>
            <span style="color: #fcd34d; margin-right: 5px;">💰</span>
        </div>

        <div style="flex: 1; display: flex; justify-content: flex-end;">
            <button onclick="logout()" class="btn-logout" style="padding: 6px 10px; font-size: 0.8rem;">Odhlásit</button>
        </div>

    </header>

    <div id="container">
        <nav id="sidebar">
            <button class="nav-btn" data-target="office" data-name="Kancelář">Kancelář</button>
            <button class="nav-btn" data-target="match" data-name="Zápasy">Liga a zápasy</button>
            <button class="nav-btn" data-target="locker-room" data-name="Šatna">Šatna</button>
            <button class="nav-btn" data-target="training" data-name="Tréninkové hřiště">Tréninkové hřiště</button>
            <button class="nav-btn" data-target="scouting" data-name="Skauting">Skauting Hráčů</button>
            <button class="nav-btn" data-target="shop" data-name="Obchod">Fanshop</button>
            <button class="nav-btn" data-target="stadium" data-name="Stadion">Stadion</button>
            <button class="nav-btn" data-target="pve" data-name="Podzemí (PvE)">Podzemí (PvE)</button>
            <button class="nav-btn" data-target="hall-of-fame" data-name="Síň Slávy">Síň Slávy</button>
            <button class="nav-btn" data-target="minileague" data-name="Miniligy">Miniliga</button>
            <button class="nav-btn" data-target="mail" data-name="Pošta">Pošta</button>
        </nav>

        <main id="main-content">
            <h1>Vítej v klubu, trenére!</h1>
            <p>Vyber si v menu, kam chceš jít. Většina klubu se teprve staví!</p>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-database.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBTxnOLGod9J5LOCMQYy9rx6QJeIIPKMVU",
            authDomain: "mundial-baf66.firebaseapp.com",
            databaseURL: "https://mundial-baf66-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "mundial-baf66",
            storageBucket: "mundial-baf66.appspot.com",
            messagingSenderId: "49143845159",
            appId: "1:49143845159:web:faf66175b7403347c81902"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);
        const auth = getAuth(app); // Spuštění ověřování

        // PŘEDÁNÍ FUNKCÍ DO TVÉ HRY (game.js)
        window.db = database;
        window.dbRef = ref;
        window.dbSet = set;
        window.dbGet = get;
        window.dbChild = child;

        // Předání přihlašovacích funkcí do tvé hry
        window.auth = auth;
        window.signInAnonymously = signInAnonymously;
        window.onAuthStateChanged = onAuthStateChanged;
    </script>

    <script src="config.js"></script>
    <script src="items.js"></script>
    <script src="engine.js"></script>
    <script src="ui.js"></script>
    <script src="game.js"></script>
</body>
</html>
